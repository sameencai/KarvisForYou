<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Karvis · 登录</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: {
    warm: { 50:'#fdf8f6',100:'#f2e8e5',200:'#eaddd7',300:'#e0cfc7',400:'#d2bab0',500:'#bfa094',600:'#a18072',700:'#977669',800:'#846358',900:'#43302b' }
  }}}
}
</script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #fdf8f6 0%, #f2e8e5 100%); min-height: 100vh; }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4" x-data="loginApp()">
  <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">🤖</div>
      <h1 class="text-2xl font-bold text-warm-900">Karvis</h1>
      <p class="text-warm-600 text-sm mt-1">你的 AI 生活助手</p>
    </div>
    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-warm-700 mb-1">访问令牌</label>
        <input type="text" x-model="token" @keydown.enter="login()"
          class="w-full px-4 py-3 border border-warm-200 rounded-xl focus:ring-2 focus:ring-warm-400 focus:border-transparent outline-none transition"
          placeholder="粘贴令牌或从链接自动填入">
      </div>
      <button @click="login()" :disabled="loading"
        class="w-full py-3 bg-warm-700 hover:bg-warm-800 text-white rounded-xl font-medium transition disabled:opacity-50">
        <span x-show="!loading">进入</span>
        <span x-show="loading">验证中...</span>
      </button>
      <p x-show="error" x-text="error" class="text-red-500 text-sm text-center"></p>
    </div>
    <p class="text-center text-warm-500 text-xs mt-6 leading-relaxed">
      在企微中对 Karvis 说<br>「给我查看链接」获取访问令牌
    </p>
  </div>
<script>
function loginApp() {
  return {
    token: new URLSearchParams(location.search).get('token') || '',
    loading: false,
    error: '',
    async init() {
      if (this.token) this.login();
      // 检查已有 token
      const saved = localStorage.getItem('karvis_token');
      if (saved && !this.token) {
        this.token = saved;
        this.login();
      }
    },
    async login() {
      if (!this.token.trim()) { this.error = '请输入令牌'; return; }
      this.loading = true; this.error = '';
      try {
        const r = await fetch('/api/auth/verify', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({token: this.token})
        });
        const d = await r.json();
        if (d.valid) {
          localStorage.setItem('karvis_token', this.token);
          localStorage.setItem('karvis_nickname', d.nickname || '');
          location.href = '/web/dashboard';
        } else {
          this.error = d.expired ? '令牌已过期，请重新获取' : '令牌无效';
        }
      } catch(e) { this.error = '网络错误'; }
      this.loading = false;
    }
  }
}
</script>
</body>
</html>
